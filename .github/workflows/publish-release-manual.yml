name: Publish Manual Release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'The application release version'
        required: true
        default: '4.1.1'

jobs:
  build:
    uses: ./.github/workflows/build-template.yml
    with:
      maven_command: 'mvn -Drevision=${{ github.event.inputs.release_version }} -B verify'
      upload_artifact: true
  docker:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
      packages: write
    env:
      DOCKER_IMAGE: ${{ github.repository_owner }}/fredbet
      DOCKER_TARGET_PLATFORM: linux/arm64/v8,linux/amd64
      # Docker Hub push only runs when the secrets exist (i.e. upstream); forks publish to ghcr only.
      PUBLISH_DOCKERHUB: ${{ secrets.DOCKER_TOKEN != '' }}
#    outputs:
#      release_version: ${{steps.version_update.outputs.release-version}} # use in jobs: ${{needs.build_tag_repo.outputs.release_version}}
    steps:
      - name: Checkout the code
        uses: actions/checkout@v6
      - name: Download jar file
        uses: actions/download-artifact@v8
        with:
          name: fredbet.jar
          run-id: ${{needs.build.outputs.jar_file_id}}
          path: target
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to Docker Hub
        if: env.PUBLISH_DOCKERHUB == 'true'
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image (Docker Hub + ghcr)
        if: env.PUBLISH_DOCKERHUB == 'true'
        run: |
          docker buildx build \
            --platform ${DOCKER_TARGET_PLATFORM} \
            --tag docker.io/${DOCKER_IMAGE,,}:${{ github.event.inputs.release_version }} \
            --tag ghcr.io/${DOCKER_IMAGE,,}:${{ github.event.inputs.release_version }} \
            --file ./Dockerfile \
            --output type=image,push=true .
        shell: bash
      - name: Build and push image (ghcr only)
        if: env.PUBLISH_DOCKERHUB != 'true'
        run: |
          docker buildx build \
            --platform ${DOCKER_TARGET_PLATFORM} \
            --tag ghcr.io/${DOCKER_IMAGE,,}:${{ github.event.inputs.release_version }} \
            --file ./Dockerfile \
            --output type=image,push=true .
        shell: bash
      - name: Generate changelog
        id: changelog
        uses: metcalfc/changelog-generator@v4.6.2
        with:
          myToken: ${{ secrets.GITHUB_TOKEN }}
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # This token is provided by Actions, you do not need to create your own token
        with:
          tag_name: ${{github.event.inputs.release_version}}
          draft: false
          prerelease: false
          body: ${{steps.changelog.outputs.changelog}}
